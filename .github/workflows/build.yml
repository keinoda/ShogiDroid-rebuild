name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install Android workload
      run: dotnet workload install android

    - name: Build Debug
      run: dotnet build -c Debug ShogiDroid/ShogiDroid.csproj

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: ShogiDroid/bin/Debug/net9.0-android/android-arm64/com.siganus.ShogiDroid.rebuild-Signed.apk
        retention-days: 14
